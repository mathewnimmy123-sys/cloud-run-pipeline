steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/sample-repo/sample-app:$SHORT_SHA'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/sample-repo/sample-app:$SHORT_SHA'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'deploy'
      - 'releases'
      - 'create'
      - 'release-$SHORT_SHA'
      - '--delivery-pipeline=sample-app-pipeline'
      - '--region=us-central1'
      - '--images=us-central1-docker.pkg.dev/$PROJECT_ID/sample-repo/sample-app=us-central1-docker.pkg.dev/$PROJECT_ID/sample-repo/sample-app:$SHORT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY